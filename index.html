<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Glide 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #466d9b 0%, #7fa7db 32%, #d8eaff 72%, #f8fcff 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #0a2740;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(10, 39, 64, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
      max-width: min(340px, 72vw);
    }

    #hud h1 { margin: 0 0 6px; font-size: 1.05rem; }
    #hud p { margin: 0; line-height: 1.4; font-size: 0.88rem; }
    #speed, #altitude { font-weight: 700; }
    canvas { display: block; }
  </style>
</head>
<body>
  <aside id="hud">
    <h1>Sky Glide 3D</h1>
    <p>
      WASD flight controls: W/S pitch, A/D roll, Q/E yaw. Shift = afterburner boost.<br />
      Airspeed: <span id="speed">0</span> u/s | Altitude: <span id="altitude">0</span> m
    </p>
  </aside>

  <script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';

/* ================== SCENE ================== */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xd4e5ff, 260, 2200);

const camera = new THREE.PerspectiveCamera(76, innerWidth / innerHeight, 0.1, 3200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* ================== LIGHT ================== */
scene.add(new THREE.HemisphereLight(0xdeebff, 0x35506a, 1.4));

const sun = new THREE.DirectionalLight(0xffefcf, 1.3);
sun.position.set(240, 260, 140);
sun.castShadow = true;
sun.shadow.mapSize.set(512, 512);
scene.add(sun);

/* ================== TERRAIN ================== */
const CHUNK_SIZE = 400;
const CHUNK_SEGMENTS = 48;
const RENDER_DISTANCE = 3;

const chunks = new Map();
const chunkPool = [];

function chunkKey(x,z){ return x+","+z; }

function terrainHeightAt(x,z){
  return Math.sin(x*0.002)*20 + Math.cos(z*0.002)*20;
}

function updateChunkGeometry(mesh,cx,cz){
  const pos = mesh.geometry.attributes.position;
  const ox = cx*CHUNK_SIZE;
  const oz = cz*CHUNK_SIZE;

  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i)+ox;
    const z = pos.getZ(i)+oz;
    pos.setY(i, terrainHeightAt(x,z));
  }
  pos.needsUpdate = true;
  mesh.position.set(ox,0,oz);
}

function createChunk(){
  const geo = new THREE.PlaneGeometry(CHUNK_SIZE,CHUNK_SIZE,CHUNK_SEGMENTS,CHUNK_SEGMENTS);
  geo.rotateX(-Math.PI/2);

  const mesh = new THREE.Mesh(
    geo,
    new THREE.MeshStandardMaterial({color:0x3a7a3a,flatShading:true})
  );
  mesh.receiveShadow = true;
  return {mesh};
}

function acquireChunk(cx,cz){
  const c = chunkPool.pop() ?? createChunk();
  c.cx=cx; c.cz=cz;
  updateChunkGeometry(c.mesh,cx,cz);
  scene.add(c.mesh);
  return c;
}

function releaseChunk(c){
  scene.remove(c.mesh);
  chunkPool.push(c);
}

function updateChunks(px,pz){
  const cx=Math.floor(px/CHUNK_SIZE);
  const cz=Math.floor(pz/CHUNK_SIZE);
  const needed=new Set();

  for(let x=-RENDER_DISTANCE;x<=RENDER_DISTANCE;x++){
    for(let z=-RENDER_DISTANCE;z<=RENDER_DISTANCE;z++){
      const k=chunkKey(cx+x,cz+z);
      needed.add(k);
      if(!chunks.has(k)){
        chunks.set(k, acquireChunk(cx+x,cz+z));
      }
    }
  }

  for(const [k,c] of chunks){
    if(!needed.has(k)){
      releaseChunk(c);
      chunks.delete(k);
    }
  }
}

/* ================== TREES (INSTANCED) ================== */
const treeCount = 300;
const treeGeo = new THREE.ConeGeometry(2,10,6);
const treeMat = new THREE.MeshStandardMaterial({color:0x2f7f34});

const trees = new THREE.InstancedMesh(treeGeo, treeMat, treeCount);
scene.add(trees);

const treeData = Array.from({length:treeCount},()=>({
  x:(Math.random()-0.5)*2000,
  z:(Math.random()-0.5)*2000
}));

const dummy = new THREE.Object3D();

function setTree(i,x,z){
  const y=terrainHeightAt(x,z);
  treeData[i].x=x;
  treeData[i].z=z;

  dummy.position.set(x,y+5,z);
  dummy.updateMatrix();
  trees.setMatrixAt(i,dummy.matrix);
}

for(let i=0;i<treeCount;i++){
  setTree(i,treeData[i].x,treeData[i].z);
}
trees.instanceMatrix.needsUpdate=true;

/* ================== PLANE ================== */
const planeYaw=new THREE.Group();
const planeRoll=new THREE.Group();
const planePitch=new THREE.Group();
const plane=new THREE.Group();

planeYaw.add(planeRoll);
planeRoll.add(planePitch);
planePitch.add(plane);
scene.add(planeYaw);

const body=new THREE.Mesh(
  new THREE.CapsuleGeometry(0.8,7,6,14),
  new THREE.MeshStandardMaterial({color:0xe7ebf3})
);
body.rotation.z=Math.PI/2;
plane.add(body);

/* ================== FLIGHT ================== */
const flight={
  speed:90,
  minSpeed:50,
  maxSpeed:300,
  pitch:0,roll:0,yaw:0,
  pitchVel:0,rollVel:0,yawVel:0,
  thrust:170,
  afterburner:100
};

const planeWorld=new THREE.Vector3(0,80,0);
const keys=new Set();

addEventListener('keydown',e=>keys.add(e.key.toLowerCase()));
addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));

function updateFlight(dt){
  const pitch=(keys.has('w')?1:0)-(keys.has('s')?1:0);
  const roll=(keys.has('d')?1:0)-(keys.has('a')?1:0);

  flight.pitchVel+=pitch*4*dt;
  flight.rollVel+=roll*6*dt;

  flight.rollVel*=0.9;
  flight.pitchVel*=0.9;

  flight.roll+=flight.rollVel;
  flight.pitch+=flight.pitchVel;

  planeRoll.rotation.x=flight.roll;
  planePitch.rotation.z=flight.pitch;

  const forward=new THREE.Vector3(1,0,0)
    .applyQuaternion(planePitch.getWorldQuaternion(new THREE.Quaternion()))
    .normalize();

  const thrust=flight.thrust+(keys.has('shift')?flight.afterburner:0);
  const drag=0.006*flight.speed*flight.speed;

  flight.speed+= (thrust-drag)*dt;
  flight.speed=Math.max(flight.minSpeed,Math.min(flight.maxSpeed,flight.speed));

  planeWorld.addScaledVector(forward,flight.speed*dt);

  planeYaw.position.copy(planeWorld);
  updateChunks(planeWorld.x,planeWorld.z);
}

/* ================== CAMERA ================== */
function updateCamera(){
  const offset=new THREE.Vector3(-24,7,0)
    .applyQuaternion(planePitch.getWorldQuaternion(new THREE.Quaternion()));

  camera.position.copy(planeYaw.position).add(offset);
  camera.lookAt(planeYaw.position);
}

/* ================== LOOP ================== */
const clock=new THREE.Clock();

function animate(){
  const dt=Math.min(clock.getDelta(),0.03);

  updateFlight(dt);
  updateCamera();

  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
