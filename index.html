<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Glide 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(#8bd3ff, #dff4ff);
      font-family: Arial, Helvetica, sans-serif;
      color: #0a2740;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(10, 39, 64, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
      max-width: min(340px, 72vw);
    }

    #hud h1 { margin: 0 0 6px; font-size: 1.05rem; }
    #hud p { margin: 0; line-height: 1.4; font-size: 0.88rem; }
    #speed, #altitude { font-weight: 700; }
    canvas { display: block; }
  </style>
</head>
<body>
  <aside id="hud">
    <h1>Sky Glide 3D</h1>
    <p>
      WASD flight controls: W/S pitch, A/D roll. Shift = afterburner boost.<br />
      Airspeed: <span id="speed">0</span> u/s | Altitude: <span id="altitude">0</span> m
    </p>
  </aside>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xbde8ff, 130, 700);

    const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 2400);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x355c7d, 1.25));
    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(120, 220, 80);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near = 20;
    sun.shadow.camera.far = 1200;
    sun.shadow.camera.left = -420;
    sun.shadow.camera.right = 420;
    sun.shadow.camera.top = 420;
    sun.shadow.camera.bottom = -420;
    scene.add(sun);

    // --- Procedural terrain -------------------------------------------------
    function hash2(x, z) {
      const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
      return s - Math.floor(s);
    }

    function valueNoise2(x, z) {
      const ix = Math.floor(x);
      const iz = Math.floor(z);
      const fx = x - ix;
      const fz = z - iz;
      const ux = fx * fx * (3 - 2 * fx);
      const uz = fz * fz * (3 - 2 * fz);

      const a = hash2(ix, iz);
      const b = hash2(ix + 1, iz);
      const c = hash2(ix, iz + 1);
      const d = hash2(ix + 1, iz + 1);

      const nx0 = a + (b - a) * ux;
      const nx1 = c + (d - c) * ux;
      return nx0 + (nx1 - nx0) * uz;
    }

    function fbm2(x, z) {
      let sum = 0;
      let amplitude = 0.55;
      let frequency = 0.003;
      for (let i = 0; i < 5; i += 1) {
        sum += (valueNoise2(x * frequency, z * frequency) - 0.5) * 2 * amplitude;
        amplitude *= 0.52;
        frequency *= 2.02;
      }
      return sum;
    }

    function terrainHeightAt(x, z) {
      const ridges = Math.abs(fbm2(x + 1200, z - 700)) * 18;
      const base = fbm2(x, z) * 42;
      const hills = Math.sin(x * 0.0022) * Math.cos(z * 0.002) * 14;
      return -10 + base + ridges + hills;
    }

    const terrainSize = 2600;
    const terrainSegments = 220;
    const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
    const pos = terrainGeo.attributes.position;
    const colors = [];
    for (let i = 0; i < pos.count; i += 1) {
      const x = pos.getX(i);
      const z = pos.getY(i);
      const h = terrainHeightAt(x, z);
      pos.setZ(i, h);

      const t = THREE.MathUtils.clamp((h + 20) / 90, 0, 1);
      const col = new THREE.Color().setRGB(0.13 + t * 0.22, 0.34 + t * 0.34, 0.14 + t * 0.18);
      colors.push(col.r, col.g, col.b);
    }
    terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    terrainGeo.computeVertexNormals();

    const ground = new THREE.Mesh(
      terrainGeo,
      new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.96, metalness: 0.03, flatShading: false })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Terrain markers (stylized trees) follow terrain elevation.
    const markerGroup = new THREE.Group();
    scene.add(markerGroup);
    const markerGeo = new THREE.ConeGeometry(2.2, 10, 6);
    const markerMat = new THREE.MeshStandardMaterial({ color: 0x2f7f34, roughness: 0.9 });

    function placeMarker(tree, x, z) {
      const terrainY = terrainHeightAt(x, z);
      tree.position.set(x, terrainY + 5, z);
    }

    for (let i = 0; i < 220; i += 1) {
      const tree = new THREE.Mesh(markerGeo, markerMat);
      const x = (Math.random() - 0.5) * 2100;
      const z = (Math.random() - 0.5) * 2100;
      placeMarker(tree, x, z);
      tree.castShadow = true;
      markerGroup.add(tree);
    }

    // Plane model.
    const plane = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.CapsuleGeometry(1.2, 5.5, 8, 14),
      new THREE.MeshStandardMaterial({ color: 0xe7ebf3, metalness: 0.22, roughness: 0.42 })
    );
    body.rotation.z = Math.PI / 2;
    body.castShadow = true;
    plane.add(body);

    const cockpit = new THREE.Mesh(
      new THREE.SphereGeometry(1.05, 22, 20),
      new THREE.MeshStandardMaterial({ color: 0x4f7abf, transparent: true, opacity: 0.7, roughness: 0.25 })
    );
    cockpit.scale.set(1.4, 0.7, 1);
    cockpit.position.set(1.2, 0.52, 0);
    cockpit.castShadow = true;
    plane.add(cockpit);

    const wingMat = new THREE.MeshStandardMaterial({ color: 0xd4403d, metalness: 0.16, roughness: 0.5 });
    const wing = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.14, 7.7), wingMat);
    wing.position.set(-0.2, -0.1, 0);
    wing.castShadow = true;
    plane.add(wing);

    const tailWing = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.12, 2.8), wingMat);
    tailWing.position.set(-3.35, 0.2, 0);
    tailWing.castShadow = true;
    plane.add(tailWing);

    const fin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.1, 0.14), wingMat);
    fin.position.set(-3.5, 0.75, 0);
    fin.castShadow = true;
    plane.add(fin);

    plane.position.set(0, 55, 0);
    scene.add(plane);

    // Fighter-jet-inspired tuning with corrected vertical balance.
    const flight = {
      velocity: new THREE.Vector3(55, 0, 0),
      verticalSpeed: 0,
      speed: 55,
      minSpeed: 24,
      cruiseSpeed: 64,
      maxSpeed: 145,
      stallSpeed: 30,
      pitchVel: 0,
      rollVel: 0,
      yawVel: 0,
      pitchInputSmoothed: 0,
      rollInputSmoothed: 0,
      pitchRate: 2.15,
      rollRate: 2.9,
      yawFromBank: 1.9,
      angularDamping: 3.35,
      liftCoeff: 0.0027,
      gravity: 9.8,
      dragCoeff: 0.010,
      thrust: 92
    };

    const keyState = new Set();
    const speedEl = document.getElementById('speed');
    const altitudeEl = document.getElementById('altitude');

    window.addEventListener('keydown', (event) => keyState.add(event.key.toLowerCase()));
    window.addEventListener('keyup', (event) => keyState.delete(event.key.toLowerCase()));
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    const fixedStep = 1 / 120;
    let accumulator = 0;

    function updateFlight(dt) {
      const pitchInput = (keyState.has('w') ? 1 : 0) - (keyState.has('s') ? 1 : 0);
      const rollInput = (keyState.has('d') ? 1 : 0) - (keyState.has('a') ? 1 : 0);

      // Smooth control inputs to remove jitter and key-tap harshness.
      const inputSmoothing = 1 - Math.exp(-12 * dt);
      flight.pitchInputSmoothed = THREE.MathUtils.lerp(flight.pitchInputSmoothed, pitchInput, inputSmoothing);
      flight.rollInputSmoothed = THREE.MathUtils.lerp(flight.rollInputSmoothed, rollInput, inputSmoothing);

      const controlAuthority = THREE.MathUtils.clamp((flight.speed - flight.stallSpeed) / 26, 0.32, 1.3);
      flight.pitchVel += flight.pitchInputSmoothed * flight.pitchRate * controlAuthority * dt;
      flight.rollVel += flight.rollInputSmoothed * flight.rollRate * controlAuthority * dt;

      const bank = plane.rotation.x;
      const pitchAngle = plane.rotation.z;
      const speedFactor = THREE.MathUtils.clamp(flight.speed / flight.cruiseSpeed, 0.5, 1.65);

      // Auto-level and damping for smoother wings-level recovery.
      flight.rollVel += (-bank * 0.9 - flight.rollVel * 0.95) * dt;

      // Pitch anti-oscillation near limits.
      const pitchLimit = 0.98;
      const nearPitchLimit = THREE.MathUtils.clamp(Math.abs(pitchAngle) / pitchLimit, 0, 1);
      flight.pitchVel += -Math.sign(pitchAngle) * nearPitchLimit * nearPitchLimit * 2.4 * dt;

      const pitchFactor = 1 + Math.max(0, pitchAngle) * 0.14;
      flight.yawVel += -Math.sin(bank) * flight.yawFromBank * speedFactor * pitchFactor * dt;

      const baseDamping = Math.exp(-flight.angularDamping * dt);
      const pitchDamping = Math.exp(-(flight.angularDamping + nearPitchLimit * 1.9) * dt);
      flight.pitchVel *= pitchDamping;
      flight.rollVel *= baseDamping;
      flight.yawVel *= Math.exp(-(flight.angularDamping + 1.1) * dt);

      plane.rotateZ(flight.pitchVel * dt);
      plane.rotateX(flight.rollVel * dt);
      plane.rotateY(flight.yawVel * dt);

      plane.rotation.z = THREE.MathUtils.clamp(plane.rotation.z, -0.98, 0.98);
      plane.rotation.x = THREE.MathUtils.clamp(plane.rotation.x, -1.22, 1.22);

      const forward = new THREE.Vector3(1, 0, 0).applyQuaternion(plane.quaternion);
      const drag = flight.dragCoeff * flight.speed * flight.speed;
      const afterburnerBias = keyState.has('shift') ? 35 : 0;
      const climbPenalty = Math.max(0, forward.y) * 26;
      flight.speed += (flight.thrust + afterburnerBias - drag - climbPenalty) * dt;
      flight.speed = THREE.MathUtils.clamp(flight.speed, flight.minSpeed, flight.maxSpeed);

      const bankLiftLoss = Math.max(0.2, Math.cos(bank));
      const lift = flight.liftCoeff * flight.speed * flight.speed * bankLiftLoss;
      const stallSink = Math.max(0, (flight.stallSpeed - flight.speed) * 1.4);
      const verticalAccel = (lift - flight.gravity - stallSink) + forward.y * flight.speed * 0.16;

      // Smooth vertical acceleration integration to avoid bobbing.
      const verticalBlend = 1 - Math.exp(-4.2 * dt);
      flight.verticalSpeed = THREE.MathUtils.lerp(flight.verticalSpeed, verticalAccel, verticalBlend);

      flight.velocity.lerp(forward.multiplyScalar(flight.speed), 1 - Math.exp(-9.5 * dt));
      flight.velocity.y = flight.verticalSpeed;
      plane.position.addScaledVector(flight.velocity, dt);

      const floorHeight = terrainHeightAt(plane.position.x, plane.position.z) + 4;
      if (plane.position.y < floorHeight) {
        plane.position.y = floorHeight;
        flight.verticalSpeed = Math.max(0, flight.verticalSpeed * 0.2);
        plane.rotation.z = THREE.MathUtils.lerp(plane.rotation.z, -0.02, 0.15);
      }

      markerGroup.children.forEach((tree) => {
        if (tree.position.distanceTo(plane.position) > 1100) {
          const x = plane.position.x + (Math.random() - 0.5) * 1700;
          const z = plane.position.z + (Math.random() - 0.5) * 1700;
          placeMarker(tree, x, z);
        }
      });

      speedEl.textContent = flight.speed.toFixed(0);
      altitudeEl.textContent = Math.max(0, plane.position.y - terrainHeightAt(plane.position.x, plane.position.z)).toFixed(0);
    }

    function updateCamera(dt) {
      const chaseOffset = new THREE.Vector3(-19, 8.5, 0).applyQuaternion(plane.quaternion);
      const targetPos = plane.position.clone().add(chaseOffset);
      camera.position.lerp(targetPos, 1 - Math.exp(-5.2 * dt));
      const lookTarget = plane.position.clone().add(new THREE.Vector3(10, 1.8, 0).applyQuaternion(plane.quaternion));
      camera.lookAt(lookTarget);
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      accumulator += dt;

      while (accumulator >= fixedStep) {
        updateFlight(fixedStep);
        accumulator -= fixedStep;
      }

      updateCamera(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
