<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Glide 3D</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <aside id="hud">
    <h1>Sky Glide 3D</h1>
    <p>
      WASD flight controls: W/S pitch, A/D roll, Q/E yaw. R/F throttle up/down. Shift = afterburner boost.<br />
      Airspeed: <span id="speed">0</span> u/s | Altitude: <span id="altitude">0</span> m
    </p>
    <div id="throttlePanel" aria-label="Throttle readout">
      <span>Throttle</span>
      <div id="throttleBar" aria-hidden="true">
        <div id="throttleFill"></div>
      </div>
      <span id="throttleValue">72%</span>
    </div>
  </aside>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
