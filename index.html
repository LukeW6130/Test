<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Glide 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #466d9b 0%, #7fa7db 32%, #d8eaff 72%, #f8fcff 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #0a2740;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(10, 39, 64, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
      max-width: min(340px, 72vw);
    }

    #hud h1 { margin: 0 0 6px; font-size: 1.05rem; }
    #hud p { margin: 0; line-height: 1.4; font-size: 0.88rem; }
    #speed, #altitude, #throttleValue { font-weight: 700; }
    #throttlePanel {
      margin-top: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 0.84rem;
    }
    #throttleBar {
      height: 10px;
      border-radius: 999px;
      background: rgba(10, 39, 64, 0.12);
      overflow: hidden;
      border: 1px solid rgba(10, 39, 64, 0.12);
    }
    #throttleFill {
      height: 100%;
      width: 72%;
      background: linear-gradient(90deg, #6cc7ff 0%, #3f82ff 60%, #ff9d3f 100%);
      transform-origin: left center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <aside id="hud">
    <h1>Sky Glide 3D</h1>
    <p>
      WASD flight controls: W/S pitch, A/D roll, Q/E yaw. R/F throttle up/down. Shift = afterburner boost.<br />
      Airspeed: <span id="speed">0</span> u/s | Altitude: <span id="altitude">0</span> m
    </p>
    <div id="throttlePanel" aria-label="Throttle readout">
      <span>Throttle</span>
      <div id="throttleBar" aria-hidden="true">
        <div id="throttleFill"></div>
      </div>
      <span id="throttleValue">72%</span>
    </div>
  </aside>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xd4e5ff, 260, 2200);

    const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 3200);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xdeebff, 0x35506a, 1.4);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffefcf, 1.4);
    sun.position.set(240, 260, 140);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near = 20;
    sun.shadow.camera.far = 1400;
    sun.shadow.camera.left = -520;
    sun.shadow.camera.right = 520;
    sun.shadow.camera.top = 520;
    sun.shadow.camera.bottom = -520;
    scene.add(sun);

    const fillLight = new THREE.DirectionalLight(0xb7d2ff, 0.32);
    fillLight.position.set(-220, 120, -140);
    scene.add(fillLight);

    const skyGeo = new THREE.SphereGeometry(2600, 36, 20);
    const sunDirection = sun.position.clone().normalize();
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      depthWrite: false,
      uniforms: {
        topColor: { value: new THREE.Color(0x2d5d97) },
        horizonColor: { value: new THREE.Color(0xc9defd) },
        bottomColor: { value: new THREE.Color(0xf8fbff) },
        hazeColor: { value: new THREE.Color(0xf7e6ca) },
        sunColor: { value: new THREE.Color(0xfff2c9) },
        sunDirection: { value: sunDirection },
        offset: { value: 35 },
        exponent: { value: 0.72 }
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 horizonColor;
        uniform vec3 bottomColor;
        uniform vec3 hazeColor;
        uniform vec3 sunColor;
        uniform vec3 sunDirection;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;

        void main() {
          vec3 dir = normalize(vWorldPosition + vec3(0.0, offset, 0.0));
          float h = dir.y;
          float topMix = max(pow(max(h, 0.0), exponent), 0.0);
          float bottomMix = max(pow(max(-h, 0.0), exponent * 1.25), 0.0);
          float hazeBand = smoothstep(-0.08, 0.12, h) * (1.0 - smoothstep(0.12, 0.42, h));
          float sunGlow = pow(max(dot(dir, normalize(sunDirection)), 0.0), 96.0);
          float sunHalo = pow(max(dot(dir, normalize(sunDirection)), 0.0), 12.0) * 0.22;

          vec3 color = mix(horizonColor, topColor, topMix);
          color = mix(color, bottomColor, bottomMix * 0.82);
          color = mix(color, hazeColor, hazeBand * 0.22 + sunHalo);
          color += sunColor * sunGlow * 0.95;
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    scene.add(skyDome);

    function hash2(x, z) {
      const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
      return s - Math.floor(s);
    }

    function valueNoise2(x, z) {
      const ix = Math.floor(x);
      const iz = Math.floor(z);
      const fx = x - ix;
      const fz = z - iz;
      const ux = fx * fx * (3 - 2 * fx);
      const uz = fz * fz * (3 - 2 * fz);

      const a = hash2(ix, iz);
      const b = hash2(ix + 1, iz);
      const c = hash2(ix, iz + 1);
      const d = hash2(ix + 1, iz + 1);

      const nx0 = a + (b - a) * ux;
      const nx1 = c + (d - c) * ux;
      return nx0 + (nx1 - nx0) * uz;
    }

    function fbm2(x, z) {
      let sum = 0;
      let amplitude = 0.55;
      let frequency = 0.003;
      for (let i = 0; i < 5; i += 1) {
        sum += (valueNoise2(x * frequency, z * frequency) - 0.5) * 2 * amplitude;
        amplitude *= 0.52;
        frequency *= 2.02;
      }
      return sum;
    }

    function terrainHeightAt(x, z) {
      const ridges = Math.abs(fbm2(x + 1200, z - 700)) * 18;
      const base = fbm2(x, z) * 42;
      const hills = Math.sin(x * 0.0022) * Math.cos(z * 0.002) * 14;
      return -10 + base + ridges + hills;
    }

    const CHUNK_SIZE = 400;
    const CHUNK_SEGMENTS = 48;
    const CHUNK_WORLD_SIZE = CHUNK_SIZE;
    const RENDER_DISTANCE = 3;

    const chunks = new Map();
    const chunkPool = [];
    const renderOrigin = new THREE.Vector3();
    const floatingOriginThreshold = CHUNK_SIZE * 0.5;

    function chunkKey(cx, cz) {
      return `${cx},${cz}`;
    }

    function updateChunkGeometry(mesh, cx, cz) {
      const geo = mesh.geometry;
      const pos = geo.attributes.position;
      const color = geo.attributes.color;
      const worldOffsetX = cx * CHUNK_WORLD_SIZE;
      const worldOffsetZ = cz * CHUNK_WORLD_SIZE;

      for (let i = 0; i < pos.count; i += 1) {
        const localX = pos.getX(i);
        const localZ = pos.getZ(i);
        const worldX = localX + worldOffsetX;
        const worldZ = localZ + worldOffsetZ;
        const h = terrainHeightAt(worldX, worldZ);
        pos.setY(i, h);

        const t = THREE.MathUtils.clamp((h + 20) / 90, 0, 1);
        color.setXYZ(i, 0.13 + t * 0.22, 0.34 + t * 0.34, 0.14 + t * 0.18);
      }

      pos.needsUpdate = true;
      color.needsUpdate = true;
      mesh.position.set(worldOffsetX - renderOrigin.x, 0, worldOffsetZ - renderOrigin.z);
    }

    function createChunk(cx, cz) {
      const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, CHUNK_SEGMENTS, CHUNK_SEGMENTS);
      geo.rotateX(-Math.PI / 2);
      const colors = new Float32Array((CHUNK_SEGMENTS + 1) * (CHUNK_SEGMENTS + 1) * 3);
      geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const mesh = new THREE.Mesh(
        geo,
        new THREE.MeshStandardMaterial({
          vertexColors: true,
          roughness: 0.96,
          metalness: 0.03,
          flatShading: true
        })
      );
      mesh.receiveShadow = true;
      return { mesh, cx, cz };
    }

    function acquireChunk(cx, cz) {
      const chunk = chunkPool.pop() ?? createChunk(cx, cz);
      chunk.cx = cx;
      chunk.cz = cz;
      updateChunkGeometry(chunk.mesh, cx, cz);
      scene.add(chunk.mesh);
      return chunk;
    }

    function releaseChunk(chunk) {
      scene.remove(chunk.mesh);
      chunkPool.push(chunk);
    }

    function syncChunkRenderPositions() {
      for (const chunk of chunks.values()) {
        chunk.mesh.position.set(
          chunk.cx * CHUNK_WORLD_SIZE - renderOrigin.x,
          0,
          chunk.cz * CHUNK_WORLD_SIZE - renderOrigin.z
        );
      }
    }

    function updateChunks(playerX, playerZ) {
      const centerCX = Math.floor(playerX / CHUNK_WORLD_SIZE);
      const centerCZ = Math.floor(playerZ / CHUNK_WORLD_SIZE);
      const needed = new Set();

      for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x += 1) {
        for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z += 1) {
          const cx = centerCX + x;
          const cz = centerCZ + z;
          const key = chunkKey(cx, cz);
          needed.add(key);
          if (!chunks.has(key)) {
            chunks.set(key, acquireChunk(cx, cz));
          }
        }
      }

      for (const [key, chunk] of chunks) {
        if (!needed.has(key)) {
          releaseChunk(chunk);
          chunks.delete(key);
        }
      }
    }

    const markerCount = 420;
    const markerGeo = new THREE.ConeGeometry(2.2, 10, 6);
    const markerMat = new THREE.MeshStandardMaterial({ color: 0x2f7f34, roughness: 0.9 });
    const markerMesh = new THREE.InstancedMesh(markerGeo, markerMat, markerCount);
    markerMesh.castShadow = false;
    markerMesh.receiveShadow = false;
    markerMesh.frustumCulled = false;
    markerMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    scene.add(markerMesh);

    const markerData = Array.from({ length: markerCount }, () => ({
      x: (Math.random() - 0.5) * 3000,
      y: 0,
      z: (Math.random() - 0.5) * 3000,
      rotationY: Math.random() * Math.PI * 2
    }));
    const markerDummy = new THREE.Object3D();

    function updateMarkerMatrix(index) {
      const marker = markerData[index];
      markerDummy.position.set(marker.x - renderOrigin.x, marker.y, marker.z - renderOrigin.z);
      markerDummy.rotation.set(0, marker.rotationY, 0);
      markerDummy.scale.setScalar(1);
      markerDummy.updateMatrix();
      markerMesh.setMatrixAt(index, markerDummy.matrix);
    }

    function setMarkerInstance(index, x, z, rotationY = Math.random() * Math.PI * 2) {
      const marker = markerData[index];
      marker.x = x;
      marker.y = terrainHeightAt(x, z) + 5;
      marker.z = z;
      marker.rotationY = rotationY;
      updateMarkerMatrix(index);
    }

    function syncMarkerRenderPositions() {
      for (let i = 0; i < markerCount; i += 1) {
        updateMarkerMatrix(i);
      }
      markerMesh.instanceMatrix.needsUpdate = true;
    }

    const markerResetDistance = CHUNK_WORLD_SIZE * (RENDER_DISTANCE + 1.75);
    const markerResetDistanceSq = markerResetDistance * markerResetDistance;

    for (let i = 0; i < markerCount; i += 1) {
      const marker = markerData[i];
      setMarkerInstance(i, marker.x, marker.z, marker.rotationY);
    }
    markerMesh.instanceMatrix.needsUpdate = true;

    const planeYaw = new THREE.Group();
    const planeRoll = new THREE.Group();
    const planePitch = new THREE.Group();
    const plane = new THREE.Group();
    planeYaw.add(planeRoll);
    planeRoll.add(planePitch);
    planePitch.add(plane);

    const fighterBodyMat = new THREE.MeshStandardMaterial({
      color: 0x909aa4,
      metalness: 0.28,
      roughness: 0.58,
      flatShading: true
    });
    const fighterDarkMat = new THREE.MeshStandardMaterial({
      color: 0x5a6169,
      metalness: 0.18,
      roughness: 0.7,
      flatShading: true
    });
    const accentMat = new THREE.MeshStandardMaterial({
      color: 0x727c86,
      metalness: 0.12,
      roughness: 0.62,
      flatShading: true
    });
    const canopyMat = new THREE.MeshStandardMaterial({
      color: 0x6f93c4,
      emissive: 0x10233b,
      metalness: 0.22,
      roughness: 0.18,
      transparent: true,
      opacity: 0.78
    });
    
    // Create a group to hold the entire jet (better for animating the whole plane later)
    const jetGroup = new THREE.Group();
    
    // 1. BODY (Top radius adjusted to perfectly match nose)
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.42, 0.92, 9.2, 10, 1, false),
      fighterBodyMat
    );
    body.rotation.z = -Math.PI / 2;
    body.scale.set(1, 0.96, 1.08);
    body.position.set(0.1, 0.06, 0);
    body.castShadow = true;
    jetGroup.add(body);
    
    // 2. NOSE (Base radius matches body's 0.42)
    const nose = new THREE.Mesh(
      new THREE.ConeGeometry(0.42, 2.75, 10, 1),
      fighterBodyMat
    );
    nose.rotation.z = -Math.PI / 2;
    nose.position.set(5.95, 0.06, 0); // Re-centered Y to match body
    nose.castShadow = true;
    jetGroup.add(nose);
    
    // 3. CHIN
    const chin = new THREE.Mesh(
      new THREE.BoxGeometry(1.55, 0.22, 0.72),
      fighterDarkMat
    );
    chin.position.set(4.35, -0.32, 0);
    chin.castShadow = true;
    jetGroup.add(chin);
    
    // 4. CANOPY & BASE
    const canopy = new THREE.Mesh(
      new THREE.BoxGeometry(2.1, 0.64, 1.18),
      canopyMat
    );
    canopy.position.set(1.9, 0.72, 0);
    canopy.rotation.z = THREE.MathUtils.degToRad(-8);
    canopy.castShadow = true;
    jetGroup.add(canopy);
    
    const canopyBase = new THREE.Mesh(
      new THREE.BoxGeometry(2.25, 0.14, 1.28),
      accentMat
    );
    canopyBase.position.set(1.85, 0.38, 0);
    canopyBase.rotation.z = THREE.MathUtils.degToRad(-8);
    canopyBase.castShadow = true;
    jetGroup.add(canopyBase);
    
    // 5. WINGS (Using ExtrudeGeometry)
    const wingShape = new THREE.Shape();
    wingShape.moveTo(-2.8, 0.0);
    wingShape.lineTo(-0.9, 0.56);
    wingShape.lineTo(2.55, 2.45);
    wingShape.lineTo(1.08, 0.08);
    wingShape.lineTo(-1.32, -0.12);
    wingShape.lineTo(-2.8, 0.0);
    
    const wingGeometry = new THREE.ExtrudeGeometry(wingShape, {
      depth: 0.14,
      bevelEnabled: false
    });
    wingGeometry.rotateX(Math.PI / 2);
    wingGeometry.translate(0, 0.02, -0.07);
    
    const leftWing = new THREE.Mesh(wingGeometry, fighterBodyMat);
    leftWing.position.set(0.18, -0.04, 0.86);
    leftWing.castShadow = true;
    jetGroup.add(leftWing);
    
    const rightWing = new THREE.Mesh(wingGeometry, fighterBodyMat);
    rightWing.position.set(0.18, -0.04, -0.86);
    rightWing.scale.z = -1;
    rightWing.castShadow = true;
    jetGroup.add(rightWing);
    
    // 6. STRAKES (Changed rotation from Z to Y for proper sweep)
    const strakeGeo = new THREE.BoxGeometry(1.4, 0.08, 0.36);
    const leftStrake = new THREE.Mesh(strakeGeo, accentMat);
    leftStrake.position.set(2.05, -0.08, 0.53);
    leftStrake.rotation.y = THREE.MathUtils.degToRad(-18); 
    leftStrake.castShadow = true;
    jetGroup.add(leftStrake);
    
    const rightStrake = leftStrake.clone();
    rightStrake.position.z = -0.53;
    rightStrake.rotation.y = THREE.MathUtils.degToRad(18);
    jetGroup.add(rightStrake);
    
    // 7. TAIL WING (Horizontal Stabilizers)
    const tailWing = new THREE.Mesh(
      new THREE.BoxGeometry(2.15, 0.12, 2.95),
      fighterBodyMat
    );
    tailWing.position.set(-3.55, 0.3, 0);
    tailWing.castShadow = true;
    jetGroup.add(tailWing);
    
    // 8. FINS (Vertical Stabilizers - Corrected axes for V-Tail flare)
    const finGeometry = new THREE.BoxGeometry(1.0, 1.65, 0.14);
    const leftFin = new THREE.Mesh(finGeometry, fighterBodyMat);
    leftFin.position.set(-3.72, 1.1, 0.4);
    leftFin.rotation.z = THREE.MathUtils.degToRad(-25); // Sweep back
    leftFin.rotation.x = THREE.MathUtils.degToRad(20);  // Flare outward
    leftFin.castShadow = true;
    jetGroup.add(leftFin);
    
    const rightFin = leftFin.clone();
    rightFin.position.z = -0.4;
    rightFin.rotation.x = THREE.MathUtils.degToRad(-20); // Flare outward opposite direction
    jetGroup.add(rightFin);
    
    // 9. ENGINES & EXHAUST
    const engineGeo = new THREE.BoxGeometry(2.9, 0.64, 0.72);
    const engineLeft = new THREE.Mesh(engineGeo, fighterDarkMat);
    engineLeft.position.set(-1.95, -0.08, 0.46);
    engineLeft.castShadow = true;
    jetGroup.add(engineLeft);
    
    const engineRight = engineLeft.clone();
    engineRight.position.z = -0.46;
    jetGroup.add(engineRight);
    
    const engineBridge = new THREE.Mesh(
      new THREE.BoxGeometry(1.75, 0.16, 0.92),
      accentMat
    );
    engineBridge.position.set(-1.55, -0.24, 0);
    engineBridge.castShadow = true;
    jetGroup.add(engineBridge);
    
    const exhaustGeo = new THREE.CylinderGeometry(0.24, 0.34, 0.92, 8, 1, true);
    const exhaustLeft = new THREE.Mesh(exhaustGeo, fighterDarkMat);
    exhaustLeft.rotation.z = Math.PI / 2;
    exhaustLeft.position.set(-4.86, 0.0, 0.43);
    exhaustLeft.castShadow = true;
    jetGroup.add(exhaustLeft);
    
    const exhaustRight = exhaustLeft.clone();
    exhaustRight.position.z = -0.43;
    jetGroup.add(exhaustRight);
    
    // 10. BELLY & SPINE
    const belly = new THREE.Mesh(
      new THREE.BoxGeometry(4.25, 0.18, 1.12),
      fighterDarkMat
    );
    belly.position.set(-0.35, -0.54, 0);
    belly.castShadow = true;
    jetGroup.add(belly);
    
    const spine = new THREE.Mesh(
      new THREE.BoxGeometry(3.05, 0.18, 0.58),
      accentMat
    );
    spine.position.set(-0.55, 0.42, 0);
    spine.rotation.z = THREE.MathUtils.degToRad(-4);
    spine.castShadow = true;
    jetGroup.add(spine);
    
    // 11. COCKPIT GLOW
    const cockpitGlow = new THREE.Mesh(
      new THREE.SphereGeometry(0.36, 10, 10),
      new THREE.MeshStandardMaterial({
        color: 0x9ec1ff,
        emissive: 0x1c3f72,
        metalness: 0.0,
        roughness: 0.15,
        transparent: true,
        opacity: 0.35
      })
    );
    cockpitGlow.scale.set(1.8, 0.7, 1.1);
    cockpitGlow.position.set(1.95, 0.77, 0);
    cockpitGlow.castShadow = true;
    jetGroup.add(cockpitGlow);
    
    // Finally, add the entire assembled jet to your scene/plane
    plane.add(jetGroup);

    scene.add(planeYaw);

    const planeWorld = new THREE.Vector3(0, 55, 0);
    renderOrigin.copy(planeWorld);
    renderOrigin.y = 0;
    planeYaw.position.set(0, planeWorld.y, 0);
    updateChunks(planeWorld.x, planeWorld.z);

    const flight = {
      velocity: new THREE.Vector3(55, 0, 0),
      speed: 55,
      minSpeed: 25,
      cruiseSpeed: 60,
      maxSpeed: 150,
      stallSpeed: 25,
      pitch: 0,
      roll: 0,
      yaw: 0,
      pitchVel: 0,
      rollVel: 0,
      yawVel: 0,
      pitchInputSmoothed: 0,
      rollInputSmoothed: 0,
      yawInputSmoothed: 0,
      pitchRate: 3.0,
      rollRate: 4.0,
      yawRate: 0.8,
      pitchDamping: 3.0,
      rollDamping: 3.0,
      yawDamping: 2.0,
      liftCoeff: 0.0010,
      dragCoeff: 0.002,
      inducedDrag: 0.0001,
      thrust: 80,
      throttle: 0.72,
      throttleAdjustRate: 0.55,
      afterburnerFactor: 1.8,
      gravity: 9.8,
      stallSink: 5.0,
      aoa: 0,
      aoaLiftFactor: 1.6,
      aoaDragFactor: 0.65,
      criticalAoa: 0.22,
      maxAoa: 0.48,
      turnDragCoeff: 0.00018,
      liftYawFactor: 0.55,
      verticalSpeed: 0,
      verticalAcceleration: 0
    };

    const keyState = new Set();
    const speedEl = document.getElementById('speed');
    const altitudeEl = document.getElementById('altitude');
    const throttleValueEl = document.getElementById('throttleValue');
    const throttleFillEl = document.getElementById('throttleFill');

    window.addEventListener('keydown', (event) => keyState.add(event.key.toLowerCase()));
    window.addEventListener('keyup', (event) => keyState.delete(event.key.toLowerCase()));
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    const fixedStep = 1 / 120;
    let accumulator = 0;
    let markerRefreshTimer = 0;
    const forwardVec = new THREE.Vector3();
    const velocityDirVec = new THREE.Vector3();
    const desiredVelocity = new THREE.Vector3();
    const planeWorldQuat = new THREE.Quaternion();
    const chaseOffsetVec = new THREE.Vector3();
    const targetPosVec = new THREE.Vector3();
    const lookTargetVec = new THREE.Vector3();

    function updateRenderOrigin() {
      const shiftX = Math.abs(planeWorld.x - renderOrigin.x) > floatingOriginThreshold
        ? planeWorld.x - renderOrigin.x
        : 0;
      const shiftZ = Math.abs(planeWorld.z - renderOrigin.z) > floatingOriginThreshold
        ? planeWorld.z - renderOrigin.z
        : 0;

      if (shiftX === 0 && shiftZ === 0) {
        return;
      }

      renderOrigin.x += shiftX;
      renderOrigin.z += shiftZ;
      camera.position.x -= shiftX;
      camera.position.z -= shiftZ;
    }

    function syncRenderedWorld() {
      planeYaw.position.set(
        planeWorld.x - renderOrigin.x,
        planeWorld.y,
        planeWorld.z - renderOrigin.z
      );
      syncChunkRenderPositions();
      syncMarkerRenderPositions();
    }

    function updateFlight(dt) {
      const pitchInput = (keyState.has('w') ? 1 : 0) - (keyState.has('s') ? 1 : 0);
      const rollInput = (keyState.has('d') ? 1 : 0) - (keyState.has('a') ? 1 : 0);
      const yawInput = (keyState.has('q') ? 1 : 0) - (keyState.has('e') ? 1 : 0);

      const throttleInput = (keyState.has('r') ? 1 : 0) - (keyState.has('f') ? 1 : 0);
      flight.throttle = THREE.MathUtils.clamp(
        flight.throttle + throttleInput * flight.throttleAdjustRate * dt,
        0,
        1
      );

      const inputAlpha = 1 - Math.exp(-16 * dt);
      flight.pitchInputSmoothed = THREE.MathUtils.lerp(flight.pitchInputSmoothed, pitchInput, inputAlpha);
      flight.rollInputSmoothed = THREE.MathUtils.lerp(flight.rollInputSmoothed, rollInput, inputAlpha);
      flight.yawInputSmoothed = THREE.MathUtils.lerp(flight.yawInputSmoothed, yawInput, inputAlpha);

      // High-speed control stiffening: the faster the jet goes, the heavier pitch/roll inputs feel.
      const speedFactor = THREE.MathUtils.clamp(flight.speed / flight.maxSpeed, 0, 1);
      const controlScale = Math.max(0.6, 1 - speedFactor * 0.4);
      flight.pitchVel += flight.pitchInputSmoothed * flight.pitchRate * controlScale * dt;
      flight.rollVel += flight.rollInputSmoothed * flight.rollRate * controlScale * dt;
      flight.yawVel += flight.yawInputSmoothed * flight.yawRate * dt;

      if (Math.abs(flight.pitchInputSmoothed) < 1e-3) {
        flight.pitchVel -= 0.15 * dt;
      }

      flight.pitchVel -= flight.pitchVel * flight.pitchDamping * dt;
      flight.rollVel -= flight.rollVel * flight.rollDamping * dt;
      flight.yawVel -= flight.yawVel * flight.yawDamping * dt;

      flight.pitch = THREE.MathUtils.clamp(flight.pitch + flight.pitchVel * dt, -10, 10);
      flight.roll = THREE.MathUtils.clamp(flight.roll + flight.rollVel * dt, -10, 10);
      flight.yaw += flight.yawVel * dt;
      flight.yaw = ((flight.yaw + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;

      planeYaw.rotation.y = flight.yaw;
      planeRoll.rotation.x = flight.roll;
      planePitch.rotation.z = flight.pitch;
      planePitch.getWorldQuaternion(planeWorldQuat);

      forwardVec.set(1, 0, 0).applyQuaternion(planeWorldQuat).normalize();
      velocityDirVec.copy(flight.velocity);
      if (velocityDirVec.lengthSq() > 1e-6) {
        velocityDirVec.normalize();
      } else {
        velocityDirVec.copy(forwardVec);
      }

      // Angle of attack: compare nose direction to flight-path direction.
      const forwardPitch = Math.atan2(forwardVec.y, Math.hypot(forwardVec.x, forwardVec.z));
      const velocityPitch = Math.atan2(velocityDirVec.y, Math.hypot(velocityDirVec.x, velocityDirVec.z));
      flight.aoa = THREE.MathUtils.clamp(forwardPitch - velocityPitch, -flight.maxAoa, flight.maxAoa);
      const positiveAoa = Math.max(0, flight.aoa);
      const stallProgress = THREE.MathUtils.clamp(
        (positiveAoa - flight.criticalAoa) / Math.max(1e-6, flight.maxAoa - flight.criticalAoa),
        0,
        1
      );
      const effectiveAoa = positiveAoa * (1 - 0.65 * stallProgress);

      let thrust = flight.thrust * flight.throttle;
      if (keyState.has('shift')) {
        thrust *= flight.afterburnerFactor;
      }

      // AoA and turn/G loading both add induced drag, so hard pulls bleed speed.
      const loadFactor = 1 / Math.max(0.35, Math.abs(Math.cos(flight.roll)));
      const parasiteDrag = flight.dragCoeff * flight.speed * flight.speed;
      const inducedDrag = flight.inducedDrag * flight.speed * flight.speed * (
        Math.abs(flight.roll) + Math.abs(flight.aoa) * flight.aoaDragFactor
      );
      const turnDrag = flight.turnDragCoeff * loadFactor * Math.abs(flight.pitchInputSmoothed) * flight.speed * flight.speed;
      const totalDrag = parasiteDrag + inducedDrag + turnDrag;
      flight.speed += (thrust - totalDrag) * dt;
      flight.speed = THREE.MathUtils.clamp(flight.speed, flight.minSpeed, flight.maxSpeed);

      // Lift vector tilt: banking redirects lift sideways, which now drives turning instead of roll->yaw coupling.
      // Base lift scales with AoA (not constant)
      // Base lift
      const liftBase = flight.liftCoeff * flight.speed * flight.speed;
      
      // Base lift so the plane can actually fly level
      const baseLift = 0.3;
      
      // AoA influence (adds or subtracts from base lift)
      const liftFromAoa = flight.aoa * flight.aoaLiftFactor;
      
      // Combine them
      const liftCoefficient = THREE.MathUtils.clamp(
        baseLift + liftFromAoa,
        -0.4,
        1.2
      );
      
      // Final lift force
      const liftForce = liftBase * liftCoefficient;
      
      // Apply banking
      const verticalLift = liftForce * Math.cos(flight.roll);
      const sidewaysForce = -liftForce * Math.sin(flight.roll);
      
      // Turn from bank
      flight.yawVel += (sidewaysForce * flight.liftYawFactor / Math.max(flight.speed, 1)) * dt;

      flight.verticalAcceleration = verticalLift - flight.gravity;
      if (flight.speed < flight.stallSpeed) {
        flight.verticalAcceleration -= (flight.stallSpeed - flight.speed) * flight.stallSink;
      }
      if (stallProgress > 0) {
        flight.verticalAcceleration -= stallProgress * 6;
      }

      flight.verticalSpeed += flight.verticalAcceleration * dt;
      flight.verticalSpeed = THREE.MathUtils.clamp(flight.verticalSpeed, -40, 40);

      desiredVelocity.copy(forwardVec).multiplyScalar(flight.speed);
      desiredVelocity.y = flight.verticalSpeed;
      flight.velocity.copy(desiredVelocity);
      planeWorld.addScaledVector(flight.velocity, dt);

      const groundY = terrainHeightAt(planeWorld.x, planeWorld.z);
      const floorHeight = groundY + 5;
      if (planeWorld.y < floorHeight) {
        planeWorld.y = floorHeight;
        flight.verticalSpeed = 0;
        flight.pitch *= 0.9;
        flight.pitchVel *= 0.5;
      }

      updateRenderOrigin();
      syncRenderedWorld();
      updateChunks(planeWorld.x, planeWorld.z);

      markerRefreshTimer += dt;
      if (markerRefreshTimer >= 0.08) {
        markerRefreshTimer = 0;
        for (let i = 0; i < markerCount; i += 1) {
          const marker = markerData[i];
          const dx = marker.x - planeWorld.x;
          const dz = marker.z - planeWorld.z;
          if (dx * dx + dz * dz > markerResetDistanceSq) {
            const x = planeWorld.x + (Math.random() - 0.5) * 1700;
            const z = planeWorld.z + (Math.random() - 0.5) * 1700;
            setMarkerInstance(i, x, z);
          }
        }
        markerMesh.instanceMatrix.needsUpdate = true;
      }

      speedEl.textContent = flight.speed.toFixed(0);
      altitudeEl.textContent = Math.max(0, planeWorld.y - groundY).toFixed(0);
      const throttlePercent = Math.round(flight.throttle * 100);
      throttleValueEl.textContent = `${throttlePercent}%`;
      throttleFillEl.style.width = `${throttlePercent}%`;
    }

    function updateCamera(dt) {
      chaseOffsetVec.set(-19, 8.5, 0).applyQuaternion(planeWorldQuat);
      targetPosVec.copy(planeYaw.position).add(chaseOffsetVec);
      camera.position.lerp(targetPosVec, 1 - Math.exp(-5.2 * dt));

      lookTargetVec
        .set(10, 1.8, 0)
        .applyQuaternion(planeWorldQuat)
        .add(planeYaw.position);

      camera.lookAt(lookTargetVec);
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.04);
      accumulator += dt;

      let substeps = 0;
      while (accumulator >= fixedStep && substeps < 5) {
        updateFlight(fixedStep);
        accumulator -= fixedStep;
        substeps += 1;
      }

      if (substeps === 5 && accumulator > fixedStep * 2) {
        accumulator = fixedStep;
      }

      updateCamera(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
